<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Divine Verse | Luxury Spiritual Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f9f295;
            --gold-dark: #b8860b;
            --white-pure: #ffffff;
            --white-soft: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(212, 175, 55, 0.3);
            --heavenly-shadow: 0 8px 32px 0 rgba(212, 175, 55, 0.2);
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --white-pure: #0a0a0a;
            --white-soft: rgba(15, 15, 15, 0.9);
            --glass-bg: rgba(0, 0, 0, 0.4);
            --gold-primary: #f9f295;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
        }

        /* --- Background Effects --- */
        #canvas-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .cloud-container {
            position: fixed;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        .cloud {
            position: absolute;
            background: radial-gradient(circle, white 20%, transparent 70%);
            filter: blur(50px);
            border-radius: 50%;
            animation: floatClouds 20s infinite alternate ease-in-out;
        }

        @keyframes floatClouds {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.2); }
        }

        /* --- Language Selection Overlay --- */
        #language-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .lang-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .lang-btn {
            padding: 15px 40px;
            border: 1px solid var(--gold-primary);
            background: transparent;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }

        .lang-btn:hover {
            background: var(--gold-primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212,175,55,0.3);
        }

        /* --- UI Elements --- */
        header {
            padding: 30px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .logo-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0.1)); }
            to { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); }
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- Verse Card --- */
        .verse-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 40px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-shadow: var(--heavenly-shadow);
            position: relative;
            transform: translateY(0);
            transition: var(--transition);
        }

        .verse-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold-primary);
        }

        .verse-text {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.95);
        }

        .verse-meta {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: var(--gold-dark);
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .verse-source {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* --- Controls --- */
        .controls {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cta-gold {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cta-gold:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.6);
        }

        .action-btn {
            background: var(--white-pure);
            border: 1px solid var(--gold-primary);
            color: var(--gold-dark);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .action-btn:hover {
            background: var(--gold-primary);
            color: white;
        }

        /* --- Floating Symbols --- */
        .symbol {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            opacity: 0.4;
            animation: floatSymbol 10s infinite linear;
        }

        @keyframes floatSymbol {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .animate-in {
            animation: fadeIn 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .logo-title { font-size: 2rem; }
            .verse-text { font-size: 1.4rem; }
            .lang-grid { grid-template-columns: 1fr; }
            .verse-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-particles"></canvas>
    
    <div id="language-overlay">
        <h1 class="logo-title" style="font-size: 2rem;">Select Language</h1>
        <div class="lang-grid">
            <button class="lang-btn" onclick="setLanguage('en')">English</button>
            <button class="lang-btn" onclick="setLanguage('fa')">Persian</button>
            <button class="lang-btn" onclick="setLanguage('ar')">Arabic</button>
            <button class="lang-btn" onclick="setLanguage('tr')">Turkish</button>
            <button class="lang-btn" onclick="setLanguage('fr')">French</button>
            <button class="lang-btn" onclick="setLanguage('de')">German</button>
            <button class="lang-btn" onclick="setLanguage('es')">Spanish</button>
            <button class="lang-btn" onclick="setLanguage('ru')">Russian</button>
        </div>
    </div>

    <header>
        <h1 class="logo-title" id="ui-title">Daily Divine Verse</h1>
        <p id="ui-subtitle" style="font-family: 'Cinzel'; opacity: 0.8;">Sacred wisdom for your soul</p>
    </header>

    <main class="main-container">
        <div class="verse-card" id="verse-card">
            <div id="verse-content">
                <p class="verse-text" id="main-verse">Click the button below to receive your daily message from the Divine.</p>
                <div class="verse-meta" id="verse-ref">— Guide —</div>
                <div class="verse-source" id="verse-source">Scripture</div>
            </div>
            
            <div class="controls">
                <button class="cta-gold" id="btn-next" onclick="generateVerse()">Receive Today's Verse</button>
                <button class="action-btn" onclick="toggleFavorite()" title="Favorite">❤️</button>
                <button class="action-btn" onclick="shareVerse()" title="Share">💌</button>
            </div>
        </div>

        <div style="margin-top: 40px; display: flex; gap: 15px;">
            <button class="action-btn" onclick="toggleDarkMode()">🌓</button>
            <button class="action-btn" onclick="showHistory()">📜</button>
        </div>
    </main>

    <script>
        // --- Database ---
        const verseDatabase = [
            {
                en: "The Lord is my shepherd; I shall not want.",
                fa: "خداوند شبان من است؛ محتاج به هیچ چیز نخواهم بود.",
                ar: "الرَّبُّ رَاعِيَّ فَلَا يُعْوِزُنِي شَيْءٌ.",
                ref: "Psalm 23:1",
                source: "Bible"
            },
            {
                en: "Indeed, with hardship comes ease.",
                fa: "به راستی که با هر دشواری، آسانی است.",
                ar: "إِنَّ مَعَ الْعُسْرِ يُسْرًا",
                ref: "Surah Ash-Sharh 94:6",
                source: "Quran"
            },
            {
                en: "Love your neighbor as yourself.",
                fa: "همسایه خود را مانند خود دوست بدار.",
                ar: "تُحِبُّ قَرِيبَكَ كَنَفْسِكَ.",
                ref: "Leviticus 19:18",
                source: "Torah"
            },
            {
                en: "Be strong and courageous. Do not be afraid.",
                fa: "قوی و دلیر باشید، نترسید.",
                ar: "كُنْ قَوِيًّا وَتَشَجَّعْ. لَا تَرْهَبْ.",
                ref: "Joshua 1:9",
                source: "Bible"
            },
            {
                en: "God does not burden a soul beyond that it can bear.",
                fa: "خداوند هیچ کس را جز به اندازه توانش تکلیف نمی‌کند.",
                ar: "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا",
                ref: "Surah Al-Baqarah 2:286",
                source: "Quran"
            }
        ];

        const uiStrings = {
            en: { title: "Daily Divine Verse", subtitle: "Sacred wisdom for your soul", btn: "Receive Today's Verse" },
            fa: { title: "آیه الهی روزانه", subtitle: "خرد مقدس برای روح شما", btn: "دریافت آیه امروز" },
            ar: { title: "الآية الإلهية اليومية", subtitle: "حكمة مقدسة لروحك", btn: "استقبل آية اليوم" },
            es: { title: "Versículo Divino Diario", subtitle: "Sabiduría sagrada para tu alma", btn: "Recibir Versículo de Hoy" }
            // Additional languages would be mapped here
        };

        let currentLang = 'en';
        let favorites = JSON.parse(localStorage.getItem('favs')) || [];

        // --- Particle Engine ---
        const canvas = document.getElementById('canvas-particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    opacity: Math.random()
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = document.body.classList.contains('dark-mode') ? '#f9f295' : '#d4af37';
            
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        // --- Core Logic ---
        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('language-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('language-overlay').style.display = 'none';
                updateUI();
            }, 600);
        }

        function updateUI() {
            const strings = uiStrings[currentLang] || uiStrings['en'];
            document.getElementById('ui-title').innerText = strings.title;
            document.getElementById('ui-subtitle').innerText = strings.subtitle;
            document.getElementById('btn-next').innerText = strings.btn;
        }

        function generateVerse() {
            const card = document.getElementById('verse-card');
            const textEl = document.getElementById('main-verse');
            const refEl = document.getElementById('verse-ref');
            const sourceEl = document.getElementById('verse-source');

            // Animation reset
            textEl.classList.remove('animate-in');
            
            setTimeout(() => {
                const randomVerse = verseDatabase[Math.floor(Math.random() * verseDatabase.length)];
                
                textEl.innerText = randomVerse[currentLang] || randomVerse['en'];
                refEl.innerText = `— ${randomVerse.ref} —`;
                sourceEl.innerText = randomVerse.source;

                textEl.style.opacity = "0";
                textEl.classList.add('animate-in');
            }, 300);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function shareVerse() {
            const text = document.getElementById('main-verse').innerText;
            const ref = document.getElementById('verse-ref').innerText;
            const shareText = `"${text}" ${ref} - Shared via Daily Divine Verse`;
            
            if (navigator.share) {
                navigator.share({ title: 'Daily Divine Verse', text: shareText, url: window.location.href });
            } else {
                alert("Link copied to clipboard!");
                navigator.clipboard.writeText(shareText);
            }
        }

        function toggleFavorite() {
            const currentVerse = document.getElementById('main-verse').innerText;
            if(!favorites.includes(currentVerse)) {
                favorites.push(currentVerse);
                localStorage.setItem('favs', JSON.stringify(favorites));
                alert("Added to Sacred Favorites ✨");
            }
        }

        // --- Symbols Decoration ---
        const symbols = ['✨', '💛', '🤍', '💌', '☁️', '🪽', '🕊️'];
        function createFloatingSymbols() {
            setInterval(() => {
                const sym = document.createElement('div');
                sym.className = 'symbol';
                sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                sym.style.left = Math.random() * 100 + 'vw';
                sym.style.fontSize = (Math.random() * 20 + 20) + 'px';
                document.body.appendChild(sym);
                setTimeout(() => sym.remove(), 10000);
            }, 3000);
        }

        // Initialization
        window.onload = () => {
            initParticles();
            animateParticles();
            createFloatingSymbols();
        };

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
