<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آیه روزانه</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:linear-gradient(180deg,#fffef8,#fff8e1,#ffffff);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.floating{
position:absolute;
font-size:28px;
opacity:.25;
animation:float 15s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-150px);
}
}

.card{
width:90%;
max-width:700px;
background:rgba(255,255,255,.8);
backdrop-filter:blur(10px);
border-radius:30px;
padding:35px;
text-align:center;
box-shadow:0 0 40px rgba(255,215,0,.25);
}

h1{
font-size:40px;
color:#d4a700;
margin-bottom:15px;
}

.subtitle{
color:#777;
margin-bottom:25px;
line-height:1.8;
}

button{
background:linear-gradient(45deg,#FFD700,#F4C430);
border:none;
padding:18px 35px;
border-radius:50px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

#verse{
margin-top:30px;
font-size:22px;
line-height:2;
color:#333;
min-height:120px;
}

.footer{
margin-top:20px;
color:#999;
font-size:14px;
}
</style>

</head>

<body>

<div class="floating" style="left:10%;animation-delay:0s;">✨</div>
<div class="floating" style="left:25%;animation-delay:2s;">🕊️</div>
<div class="floating" style="left:40%;animation-delay:4s;">💛</div>
<div class="floating" style="left:55%;animation-delay:6s;">☁️</div>
<div class="floating" style="left:70%;animation-delay:8s;">🪽</div>
<div class="floating" style="left:85%;animation-delay:10s;">💌</div>

<div class="card">

<h1>🤍 آیه روزانه 🤍</h1>

<p class="subtitle">
هر روز یک پیام الهام‌بخش برای آرامش قلب و روح
</p>

<button onclick="showVerse()">
✨ دریافت آیه امروز ✨
</button>

<div id="verse">
روی دکمه بالا کلیک کن
</div>

<div class="footer">
🌿 نسخه آزمایشی سایت
</div>

</div>

<script>

const verses=[
"خداوند نور آسمان‌ها و زمین است ✨",
"با خدا همه چیز ممکن است 🤍",
"دل خود را مضطرب مساز، ایمان داشته باش 🕊️",
"خدا نزدیک دل‌های شکسته است 💛",
"رحمت خداوند هر صبح تازه می‌شود ☁️",
"در آرامش و اعتماد قوت شماست 🌿",
"محبت هرگز شکست نمی‌خورد ❤️",
"خوشا به حال پاکدلان زیرا خدا را خواهند دید ✨"
];

function showVerse(){
const random=Math.floor(Math.random()*verses.length);
document.getElementById("verse").innerHTML=verses[random];
}

</script>

</body>
</html>
